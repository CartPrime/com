<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Cart Prime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f9f9f9; padding: 20px; }
        .container { max-width: 1000px; margin: 40px auto; background: white; display: flex; flex-wrap: wrap; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        /* Image Section */
        .image-section { flex: 1.2; min-width: 300px; padding: 30px; border-right: 1px solid #eee; }
        .main-img-container { width: 100%; text-align: center; height: 350px; }
        #mainImg { max-width: 100%; height: 100%; object-fit: contain; }
        
        .thumb-container { display: flex; gap: 10px; justify-content: center; margin-top: 20px; overflow-x: auto; }
        .thumb-img { 
            width: 70px; height: 70px; object-fit: cover; 
            border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .thumb-img:hover, .thumb-img.active { border-color: #ff9900; transform: scale(1.05); }

        /* Info Section */
        .info-section { flex: 1; min-width: 300px; padding: 40px; }
        .info-section h1 { font-size: 28px; margin-bottom: 10px; }
        .price { font-size: 26px; color: #28a745; font-weight: bold; margin-bottom: 15px; }
        .desc { color: #555; line-height: 1.6; margin-bottom: 30px; }
        .buy-now { background: #ff9900; width: 100%; padding: 15px; border: none; margin-top: 160px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        .back-link { text-decoration: none; color: #1a73e8; font-weight: bold; display: block; margin-bottom: 15px; }
        
        @media (max-width: 768px) { .container { flex-direction: column; } .image-section { border-right: none; } }
    </style>
</head>
<body>

    <div style="max-width: 1000px; margin: auto;">
        <a href="index.html" class="back-link">← Back to Shop</a>
    </div>

    <div class="container">
        <div class="image-section">
            <div class="main-img-container">
                <img id="mainImg" src="" alt="Main Image">
            </div>
            <div id="thumbContainer" class="thumb-container"></div>
        </div>
        
        <div class="info-section">
            
            <h1 id="pName"></h1>
            <p class="price">₹<span id="pPrice"></span></p>
            <p class="desc" id="pDesc"></p>
            <p style=" width: 250px; height: 50px; font-family: System-ui; font-weight: bold; text-transform: capitalize; color: #a72828;  ">The shipping date is in two days. You can cancel the order before </p>
            <button class="buy-now" onclick="proceedToCheckout()">Buy Now</button>
        </div>
    </div>

    <script>
        const name = localStorage.getItem('viewProdName');
        const price = localStorage.getItem('viewProdPrice');
        const desc = localStorage.getItem('viewProdDesc');
        const imgData = localStorage.getItem('viewProdImg') || "";

        // FILLI DOC
        document.getElementById('pName').innerText = name;
        document.getElementById('pPrice').innerText = price;
        document.getElementById('pDesc').innerText = desc || "No description available.";

        // IMAGE GALLRY
        const images = imgData.split(',').map(s => s.trim()).filter(s => s !== "");
        const mainImg = document.getElementById('mainImg');
        const thumbContainer = document.getElementById('thumbContainer');

        if (images.length > 0) {
            mainImg.src = images[0];

            images.forEach((url, index) => {
                const imgTag = document.createElement('img');
                imgTag.src = url;
                imgTag.classList.add('thumb-img');
                if(index === 0) imgTag.classList.add('active');

                imgTag.onclick = () => {
                    mainImg.src = url;
                    document.querySelectorAll('.thumb-img').forEach(i => i.classList.remove('active'));
                    imgTag.classList.add('active');
                };
                thumbContainer.appendChild(imgTag);
            });
        }

        function proceedToCheckout() {
            localStorage.setItem('tempProdName', name);
            localStorage.setItem('tempProdPrice', price);
            localStorage.setItem('tempProdImg', images[0]); 
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
