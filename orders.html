<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartPrime - My Orders</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #1a1a2e; }
        .order-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid #ff9900; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        
        /* Status Colors */
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d1e7dd; color: #0f5132; }
        .status-delivered { background: #d1e7dd; color: #0f5132; }
        .status-shipped { background: #e0f2ff; color: #007bff; }
        .status-rejected { background: #f8d7da; color: #842029; }
        .status-other { background: #eee; color: #555; }

        .order-details p { font-size: 14px; margin-bottom: 5px; color: #555; }
        .payment-success { color: #198754; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .reject-reason { background: #fff5f5; color: #dc3545; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; border: 1px dashed #dc3545; }
        .action-btn { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; margin-top: 10px; width: 100%; transition: 0.3s; }
        
        .cancel-btn { background: #dc3545; color: white; }
        .return-btn { background: #1a1a2e; color: #ff9900; border: 1px solid #ff9900; }
        
        .no-orders { text-align: center; padding: 40px; color: #999; }
        .nav-home { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #1a1a2e; font-weight: bold; }

        /* Success Message Styling */
        .success-msg { color: #0f5132; background: #d1e7dd; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 10px; font-size: 13px; border: 1px solid #badbcc; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 My Orders</h1>
        <p id="userDisplay">Loading profile...</p>
    </div>

    <div id="orderContainer">
        <div class="no-orders">Searching for your orders...</div>
    </div>

    <a href="index.html" class="nav-home">← Back to Home</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAGkPzKBoH5BGsALtEGVyn41hPk1mL__1w",
        authDomain: "yoush0pcart.firebaseapp.com",
        projectId: "yoush0pcart",
        storageBucket: "yoush0pcart.firebasestorage.app",
        messagingSenderId: "519708489514",
        appId: "1:519708489514:web:f0f97e6ea60c2915cb9053"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.addEventListener('DOMContentLoaded', () => {
        const userMob = localStorage.getItem('userMob');
        const userEmail = localStorage.getItem('userEmail');
        const userName = localStorage.getItem('userName');

        if(!userMob && !userEmail) {
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('userDisplay').innerText = userName ? "Welcome, " + userName : "Account: " + (userMob || userEmail);

        const container = document.getElementById('orderContainer');
        onValue(ref(db, 'orders'), (snapshot) => {
            container.innerHTML = "";
            let found = false;

            snapshot.forEach((childSnapshot) => {
                const order = childSnapshot.val();
                const orderId = childSnapshot.key;

                const isMyOrder = (
                    (userEmail && (order.email === userEmail || order.customerEmail === userEmail || order.userEmail === userEmail)) ||
                    (userMob && (order.userId === userMob || order.mobile == userMob || order.userMob == userMob))
                );
              
                if (isMyOrder) {
                    found = true;
                    const status = (order.status || 'Pending').trim();
                    const pName = order.checkout_name || order.product || order.productName || "Product";
                    const pPrice = order.checkout_price || order.price || "0";
                    let pPayment = order.payment || 'COD';
                    
                    let actionBtnHTML = "";
                    let statusClass = "status-other";
                    let rejectReasonHTML = "";
                    let tickMark = "";
                    let paymentDisplay = `<p>Payment: ${pPayment}</p>`;

                    const lowerStatus = status.toLowerCase();
                    const isSuccessful = ["confirmed", "shipped", "delivered"].includes(lowerStatus);
                    
                    if (lowerStatus === "pending") {
                        statusClass = "status-pending";
                        actionBtnHTML = `<button class="action-btn cancel-btn" onclick="cancelOrder('${orderId}')">Cancel Order</button>`;
                    } else if (lowerStatus === "confirmed") {
                        statusClass = "status-confirmed";
                        tickMark = `<i class="fas fa-check-circle"></i>`;
                    } else if (lowerStatus === "delivered") {
                        statusClass = "status-delivered";
                        tickMark = `<i class="fas fa-check-circle"></i>`;
                        
                        // മാറ്റം വരുത്തിയ ഭാഗം: Return Policy ചെക്ക് ചെയ്യുന്നു
                        const policy = order.returnPolicy || ""; 
                        if (policy === "No Return") {
                            actionBtnHTML = `<div class="success-msg"><i class="fas fa-check-double"></i> Your Order is Successful</div>`;
                        } else {
                            actionBtnHTML = `<button class="action-btn return-btn" onclick="returnOrder('${orderId}')">Return Product</button>`;
                        }
                    } else if (lowerStatus === "shipped") {
                        statusClass = "status-shipped";
                        tickMark = `<i class="fas fa-truck"></i>`;
                    } else if (lowerStatus === "rejected") {
                        statusClass = "status-rejected";
                        tickMark = `<i class="fas fa-times-circle"></i>`;
                        if(order.rejectReason) {
                            rejectReasonHTML = `<div class="reject-reason"><strong>Order Rejected:</strong> ${order.rejectReason}</div>`;
                        }
                    }

                    if (isSuccessful && (pPayment.includes("UPI") || pPayment.toLowerCase().includes("online"))) {
                        paymentDisplay = `<p class="payment-success"><i class="fas fa-shield-alt"></i> Your payment is successful</p>`;
                    }

                    container.innerHTML += `
                        <div class="order-card" style="border-left-color: ${lowerStatus === 'rejected' ? '#dc3545' : (isSuccessful ? '#0f5132' : '#ff9900')}">
                            <div class="order-header">
                                <strong>${pName}</strong>
                                <span class="status-badge ${statusClass}">${tickMark} ${status}</span>
                            </div>
                            <div class="order-details">
                                <p>Price: ₹${pPrice}</p>
                                ${paymentDisplay}
                                ${rejectReasonHTML}
                            </div>
                            ${actionBtnHTML}
                        </div>
                    `;
                }
            });

            if (!found) {
                container.innerHTML = "<div class='no-orders'>No orders found for this account.</div>";
            }
        });
    });

    window.cancelOrder = (id) => {
        Swal.fire({
            title: 'Cancel Order?',
            text: "Are you sure you want to cancel this order?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            confirmButtonText: 'Yes, Cancel it'
        }).then((result) => {
            if (result.isConfirmed) {
                const db = getDatabase();
                remove(ref(db, 'orders/' + id)).then(() => {
                    Swal.fire('Cancelled!', 'Your order has been removed.', 'success');
                });
            }
        });
    };

    window.returnOrder = (id) => {
        Swal.fire({
            title: 'Return Product',
            text: 'Reason for return:',
            input: 'select',
            inputOptions: {
                'damage': 'Damaged Product',
                'quality': 'Low Quality',
                'wrong': 'Wrong Item Received'
            },
            showCancelButton: true,
            confirmButtonColor: '#1a1a2e'
        }).then((result) => {
            if (result.isConfirmed) {
                const db = getDatabase();
                update(ref(db, 'orders/' + id), {
                    status: 'Return Requested',
                    returnReason: result.value
                }).then(() => {
                    Swal.fire('Request Sent', 'We will contact you soon.', 'success');
                });
            }
        });
    };
</script>
</body>
</html>
