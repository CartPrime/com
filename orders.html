<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartPrime - My Orders</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #1a1a2e; }
        .order-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid #ff9900; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        
        /* Status Colors */
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d1e7dd; color: #0f5132; }
        .status-delivered { background: #d1e7dd; color: #0f5132; }
        .status-shipped { background: #e0f2ff; color: #007bff; }
        .status-rejected { background: #f8d7da; color: #842029; }
        .status-other { background: #eee; color: #555; }

        .order-details p { font-size: 14px; margin-bottom: 5px; color: #555; }
        .payment-success { color: #198754; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .reject-reason { background: #fff5f5; color: #dc3545; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; border: 1px dashed #dc3545; }
        .action-btn { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; margin-top: 10px; width: 100%; transition: 0.3s; }
        
        .cancel-btn { background: #dc3545; color: white; }
        .return-btn { background: #1a1a2e; color: #ff9900; border: 1px solid #ff9900; }
        
        .no-orders { text-align: center; padding: 40px; color: #999; }
        .nav-home { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #1a1a2e; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 My Orders</h1>
        <p id="userDisplay">Loading profile...</p>
    </div>

    <div id="orderContainer">
        <div class="no-orders">Searching for your orders...</div>
    </div>

    <a href="index.html" class="nav-home">← Back to Home</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAGkPzKBoH5BGsALtEGVyn41hPk1mL__1w",
        authDomain: "yoush0pcart.firebaseapp.com",
        projectId: "yoush0pcart",
        storageBucket: "yoush0pcart.firebasestorage.app",
        messagingSenderId: "519708489514",
        appId: "1:519708489514:web:f0f97e6ea60c2915cb9053"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.addEventListener('DOMContentLoaded', () => {
        // ലോഗിൻ വിവരങ്ങൾ എടുക്കുന്നു
        const userMob = localStorage.getItem('userMob');
        const userEmail = localStorage.getItem('userEmail'); 
        const userName = localStorage.getItem('userName');   

        // ലോഗിൻ ചെയ്തിട്ടില്ലെങ്കിൽ മാത്രം ലോഗിൻ പേജിലേക്ക് വിടുക
        if(!userMob && !userEmail) {
            window.location.href = 'login.html';
            return;
        }

        // പേര് കാണിക്കുന്നു
        document.getElementById('userDisplay').innerText = "Account: " + (userName || userEmail || userMob);

        const container = document.getElementById('orderContainer');
        
        onValue(ref(db, 'orders'), (snapshot) => {
            container.innerHTML = "";
            let found = false;

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const order = childSnapshot.val();
                    const orderId = childSnapshot.key;

                    // എല്ലാ സാധ്യതകളും (Mobile/Email) പരിശോധിക്കുന്നു
                    const matchMobile = userMob && (order.mobile == userMob || order.userMob == userMob || order.customerMobile == userMob);
                    const matchEmail = userEmail && (order.email == userEmail || order.customerEmail == userEmail || order.userEmail == userEmail);

                    if (matchMobile || matchEmail) {
                        found = true;
                        renderOrderCard(container, order, orderId);
                    }
                });
            }

            if (!found) {
                container.innerHTML = "<div class='no-orders'>നിങ്ങളുടെ ഓർഡറുകൾ ഒന്നും കണ്ടെത്താനായില്ല.</div>";
            }
        });
    });

    // ഓർഡർ കാർഡ് ഡിസ്പ്ലേ ചെയ്യാൻ ഒരു ഫങ്ക്ഷൻ
    function renderOrderCard(container, order, orderId) {
        const status = (order.status || 'Pending').trim();
        const pName = order.checkout_name || order.productName || order.product || "Product";
        const pPrice = order.checkout_price || order.price || "0";
        const lowerStatus = status.toLowerCase();
        
        let statusClass = "status-other";
        if(lowerStatus === "pending") statusClass = "status-pending";
        else if(["confirmed", "delivered"].includes(lowerStatus)) statusClass = "status-confirmed";
        else if(lowerStatus === "rejected") statusClass = "status-rejected";

        container.innerHTML += `
            <div class="order-card">
                <div class="order-header">
                    <strong>${pName}</strong>
                    <span class="status-badge ${statusClass}">${status}</span>
                </div>
                <div class="order-details">
                    <p>Price: ₹${pPrice}</p>
                    <p>Order ID: ${orderId}</p>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
