<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Prime - Secure Checkout</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // നിങ്ങളുടെ EmailJS Public Key ഇവിടെ നൽകുക
            emailjs.init("-DWvIonAVTeMsNapk"); 
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; padding: 15px; color: #1a1a2e; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; text-align: center; font-weight: 800; color: #1a1a2e; }
        .order-box { background: #fff9f0; padding: 15px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; border: 1px dashed #ff9900; }
        .order-box img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
        .order-info b { font-size: 16px; display: block; }
        .order-info span { color: #ff9900; font-weight: bold; font-size: 18px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #666; text-transform: uppercase; }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; transition: 0.3s; }
        .form-group input:focus { border-color: #ff9900; box-shadow: 0 0 8px rgba(255, 153, 0, 0.2); outline: none; }
        .payment-status { background: #e8f5e9; padding: 12px; border-radius: 10px; color: #2e7d32; display: flex; align-items: center; gap: 10px; font-weight: 600; margin-bottom: 20px; font-size: 14px; }
        .btn-pay { background: #1a1a2e; color: #ff9900; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-pay:hover { background: #252545; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-shield-alt"></i> Checkout</h2>

    <div class="order-box">
        <img id="pImg" src="https://via.placeholder.com/70" alt="Product">
        <div class="order-info">
            <b id="pName">Loading Product...</b>
            <span id="pPrice">₹0.00</span>
        </div>
    </div>

    <div class="form-group">
        <label>Delivery Name</label>
        <input type="text" id="custName" placeholder="Full name of receiver">
    </div>
    
    <div class="form-group">
        <label>Mobile Number</label>
        <input type="number" id="custMob" readonly style="background: #f9f9f9; color: #888;">
    </div>

    <div class="form-group">
        <label>Full Delivery Address</label>
        <textarea id="custAddr" rows="3" placeholder="House/Flat No, Landmark, Pincode..."></textarea>
    </div>

    <div class="payment-status">
        <i class="fas fa-check-circle"></i>
        Only UPI Payment Accepted (Safe & Fast)
    </div>

    <button class="btn-pay" onclick="handlePayment()">
        <i class="fas fa-wallet"></i> PAY & PLACE ORDER
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAGkPzKBoH5BGsALtEGVyn41hPk1mL__1w",
        authDomain: "yoush0pcart.firebaseapp.com",
        projectId: "yoush0pcart",
        storageBucket: "yoush0pcart.firebasestorage.app",
        messagingSenderId: "519708489514",
        appId: "1:519708489514:web:f0f97e6ea60c2915cb9053"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ഇമെയിൽ അയക്കാനുള്ള ഫങ്ക്ഷൻ
    function sendOrderEmail(orderData) {
        const serviceID = "service_yvljbw9"; // നിങ്ങളുടെ EmailJS Service ID
        const templateID = "__ejs-test-mail-service_"; // നിങ്ങളുടെ EmailJS Template ID

        const emailParams = {
            to_email: "cartprimeshopping@gmail.com",
            customer_name: orderData.userName,
            customer_mob: orderData.userMob,
            product_name: orderData.checkout_name,
            amount: orderData.checkout_price,
            address: orderData.address,
            order_date: orderData.orderDate
        };

        emailjs.send(serviceID, templateID, emailParams)
            .then(() => {
                console.log("Email sent successfully!");
            }, (err) => {
                console.error("Email Error:", err);
            });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const name = localStorage.getItem('checkout_name');
        const price = localStorage.getItem('checkout_price');
        const img = localStorage.getItem('checkout_img');
        const userMob = localStorage.getItem('userMob');
        const userName = localStorage.getItem('userName');

        if(!name || !userMob) {
            Swal.fire("Session Expired", "Please select product again.", "error").then(()=> window.location.href="index.html");
            return;
        }

        document.getElementById('pName').innerText = name;
        document.getElementById('pPrice').innerText = "₹" + price;
        document.getElementById('pImg').src = img || 'https://via.placeholder.com/70';
        document.getElementById('custMob').value = userMob;
        
        if(userName) {
            document.getElementById('custName').value = userName;
        }
    });

    window.handlePayment = () => {
        const name = document.getElementById('custName').value.trim();
        const addr = document.getElementById('custAddr').value.trim();
        const mob = document.getElementById('custMob').value;
        const amount = document.getElementById('pPrice').innerText.replace('₹','');

        if(!name || !addr) {
            return Swal.fire("Empty Fields", "Please fill Name and Address", "warning");
        }

        const myUpiId = "9778722796@fam"; 
        const upiLink = `upi://pay?pa=${myUpiId}&pn=Cart Prime&am=${amount}&cu=INR`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}`;

        Swal.fire({
            title: 'Confirm Payment',
            html: `
                <div style="text-align:center">
                    <p>Click <b>Pay Now</b> to open UPI apps or Scan QR</p>
                    <img src="${qrUrl}" style="width:150px; margin:15px 0; border:5px solid #eee;">
                    <p style="font-size:12px; color:red;">Pay ₹${amount} and come back here</p>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'Pay Now (Open Apps)',
            confirmButtonColor: '#28a745',
            cancelButtonText: 'I Have Paid',
            cancelButtonColor: '#1a1a2e'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = upiLink;
                setTimeout(() => {
                    checkFinalConfirmation(name, addr, mob, amount);
                }, 3000);
            } else if (result.dismiss === Swal.DismissReason.cancel) {
                saveOrder(name, addr, mob, amount);
            }
        });
    };

    function checkFinalConfirmation(name, addr, mob, amount) {
        Swal.fire({
            title: 'Payment Status',
            text: "Did you complete the payment?",
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Yes, Place Order',
            cancelButtonText: 'No, Try Again'
        }).then((res) => {
            if(res.isConfirmed) saveOrder(name, addr, mob, amount);
        });
    }

    function saveOrder(name, addr, mob, amount) {
        Swal.showLoading();
        const pName = document.getElementById('pName').innerText;

        const orderData = {
            checkout_name: pName,
            checkout_price: amount,
            checkout_img: document.getElementById('pImg').src,
            userName: name,
            userMob: mob,
            address: addr,
            payment: "UPI (Pending Verification)",
            status: "Pending",
            orderDate: new Date().toLocaleString()
        };

        const ordersRef = ref(db, 'orders');
        const newOrderRef = push(ordersRef);
        
        set(newOrderRef, orderData).then(() => {
            // ഇമെയിൽ അയക്കുന്നു
            sendOrderEmail(orderData);

            Swal.fire({
                title: "Order Placed!",
                text: "Order placed successfully! You will receive an update soon.",
                icon: "success"
            }).then(() => {
                window.location.href = "orders.html";
            });
        }).catch((err) => {
            Swal.fire("Error", "Order Not Saved. Try again.", "error");
        });
    }
</script>
</body>
</html>
