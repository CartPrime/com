<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartPrime - Admin Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; height: 100vh; background: #1a1a2e; color: white; padding: 25px; position: fixed; }
        .sidebar h2 { color: #ff9900; margin-bottom: 40px; text-align: center; font-size: 22px; }
        .sidebar button { width: 100%; padding: 14px; background: transparent; border: none; color: #a2a2c2; text-align: left; cursor: pointer; font-size: 15px; border-radius: 8px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar button:hover, .sidebar button.active { background: #ff9900; color: #1a1a2e; font-weight: bold; }

        /* Main Content */
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .tab-content { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .active-tab { display: block !important; }

        /* UI Elements */
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1.5px solid #eee; }
        .img-input-container { display: flex; gap: 8px; margin-bottom: 8px; }
        .remove-btn { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        .display-options { display: flex; gap: 20px; margin: 15px 0; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px dashed #ccc; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; color: #555; padding: 15px; text-align: left; font-size: 13px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; font-size: 14px; vertical-align: top; }

        .badge { padding: 3px 7px; border-radius: 4px; font-size: 10px; color: white; font-weight: bold; margin-right: 3px; }
        .user-addr-box { font-size: 12px; background: #f9f9f9; padding: 10px; border-radius: 8px; border-left: 4px solid #ff9900; line-height: 1.5; margin-top: 5px; }
        .reason-text { font-size: 11px; color: #e74c3c; font-style: italic; display: block; margin-top: 4px; }
        .action-btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; color: white; font-weight: 600; margin-right: 4px; }

        /* Custom SweetAlert Rejection Styles */
        .custom-swal-select { border-radius: 8px !important; padding: 10px !important; width: 400px; font-size: 14px !important; border: 1px solid #ddd !important; }
        .custom-swal-popup { border-radius: 15px !important; padding: 20px !important;  }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>CartPrime Admin</h2>
    <button onclick="openTab('orders')" class="tablinks active"><i class="fa fa-shopping-cart"></i> &nbsp;Orders</button>
    <button onclick="openTab('addProduct')" class="tablinks"><i class="fa fa-plus-circle"></i> &nbsp;Add Product</button>
    <button onclick="openTab('manageProducts')" class="tablinks"><i class="fa fa-boxes"></i> &nbsp;Inventory</button>
    <button onclick="openTab('users')" class="tablinks"><i class="fa fa-users"></i> &nbsp;Users List</button>
</div>

<div class="main-content">
    <!-- Orders Section -->
    <div id="orders" class="tab-content active-tab">
        <h2>Order Management</h2>
        <table>
            <thead><tr><th>Customer</th><th>Product</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="orderList"></tbody>
        </table>
    </div>

    <!-- Add Product Section -->
    <div id="addProduct" class="tab-content">
        <h2>Add New Product</h2>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="Price (₹)">
        
        <div id="imageInputs">
            <label style="font-size: 13px; font-weight: bold;">Product Images:</label>
            <div class="img-input-container">
                <input type="text" class="p-img-link" placeholder="Paste Image Link 1">
            </div>
        </div>
        <button onclick="addImageField()" style="background:#3498db; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-size:12px; margin-bottom:15px;">+ Add Image Link</button>

        <div class="display-options">
            <span>Show product in:</span>
            <label><input type="checkbox" id="showHome" checked> Home Page</label>
            <label><input type="checkbox" id="showAll" checked> All Products</label>
        </div>
        <button onclick="saveProduct()" style="background:#2ecc71; color:white; padding:15px; border:none; width:100%; border-radius:8px; cursor:pointer; font-weight:bold;">SAVE PRODUCT</button>
    </div>

    <!-- Inventory Section -->
    <div id="manageProducts" class="tab-content">
        <h2>Inventory</h2>
        <table>
            <thead><tr><th>Img</th><th>Name</th><th>Display</th><th>Action</th></tr></thead>
            <tbody id="manageProductList"></tbody>
        </table>
    </div>

    <!-- Users Section -->
    <div id="users" class="tab-content">
        <h2>Users & Live Addresses</h2>
        <table>
            <thead><tr><th>User</th><th>Contact</th><th>Current Address</th></tr></thead>
            <tbody id="userList"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, push, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAGkPzKBoH5BGsALtEGVyn41hPk1mL__1w",
        authDomain: "yoush0pcart.firebaseapp.com",
        projectId: "yoush0pcart",
        storageBucket: "yoush0pcart.firebasestorage.app",
        messagingSenderId: "519708489514",
        appId: "1:519708489514:web:f0f97e6ea60c2915cb9053"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Tab Logic
    window.openTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.tablinks').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active-tab');
        event.currentTarget.classList.add('active');
    };

    // --- Dynamic Image Field Logic ---
    window.addImageField = () => {
        const div = document.createElement('div');
        div.className = 'img-input-container';
        div.innerHTML = `<input type="text" class="p-img-link" placeholder="Paste Image Link"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
        document.getElementById('imageInputs').appendChild(div);
    };

    // --- Save Product Logic ---
    window.saveProduct = () => {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const links = Array.from(document.querySelectorAll('.p-img-link')).map(i => i.value.trim()).filter(v => v !== "");
        if(!name || !price || links.length === 0) return Swal.fire('Error','Fill all details','error');

        push(ref(db, 'products'), {
            name, price, images: links,
            showOnHome: document.getElementById('showHome').checked,
            showOnAll: document.getElementById('showAll').checked
        }).then(() => { Swal.fire('Saved!','Product added','success'); location.reload(); });
    };

    // --- Inventory Update Logic ---
    onValue(ref(db, 'products'), snap => {
        const list = document.getElementById('manageProductList');
        list.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const firstImg = p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/40';
            list.innerHTML += `<tr>
                <td><img src="${firstImg}" style="width:40px; height:40px; object-fit:cover; border-radius:5px"></td>
                <td><b>${p.name}</b><br>₹${p.price}</td>
                <td>
                    ${p.showOnHome ? '<span class="badge" style="background:#2ecc71">HOME</span>':''}
                    ${p.showOnAll ? '<span class="badge" style="background:#3498db">ALL</span>':''}
                </td>
                <td>
                    <button class="action-btn" style="background:#3498db" onclick="editProduct('${c.key}')">Edit</button>
                    <button class="action-btn" style="background:#95a5a6" onclick="deleteItem('products/${c.key}')">Del</button>
                </td>
            </tr>`;
        });
    });

    // --- Edit Logic ---
    window.editProduct = async (id) => {
        const snap = await get(child(ref(db), `products/${id}`));
        const p = snap.val();
        const { value: v } = await Swal.fire({
            title: 'Edit Product',
            html: `Name: <input id="e-n" class="swal2-input" value="${p.name}">Price: <input id="e-p" type="number" class="swal2-input" value="${p.price}">`,
            showCancelButton: true,
            preConfirm: () => ({ name: document.getElementById('e-n').value, price: document.getElementById('e-p').value })
        });
        if (v) update(ref(db, 'products/' + id), v);
    };

    // --- Order Logic ---
    onValue(ref(db, 'orders'), snap => {
        const list = document.getElementById('orderList');
        list.innerHTML = "";
        snap.forEach(c => {
            const o = c.val();
            const isRej = o.status === 'Rejected';
            list.innerHTML += `<tr>
                <td><b>${o.customer}</b><br><small>${o.mobile}</small></td>
                <td>${o.product}<br>₹${o.price}</td>
                <td>
                    <b style="color:${isRej ? '#e74c3c' : (o.status === 'Confirmed' ? '#2ecc71' : '#f39c12')}">${o.status || 'Pending'}</b>
                    ${o.rejectReason ? `<span class="reason-text">Reason: ${o.rejectReason}</span>` : ''}
                </td>
                <td>
                    <button class="action-btn" style="background:#2ecc71" onclick="updateStatus('${c.key}', 'Confirmed')">Confirm</button>
                    <button class="action-btn" style="background:#e74c3c" onclick="rejectWithReason('${c.key}')">Reject</button>
                    <button class="action-btn" style="background:#95a5a6" onclick="deleteItem('orders/${c.key}')">Del</button>
                </td>
            </tr>`;
        });
    });

    window.updateStatus = (id, s) => update(ref(db, 'orders/'+id), {status: s, rejectReason: null});

    // --- Updated Modern Reject Pop-up ---
    window.rejectWithReason = async (id) => {
        const { value: reason } = await Swal.fire({
            title: 'Reject Order?',
            text: "Select a reason for cancellation",
            icon: 'warning',
            width:'500px',
            iconColor: '#e74c3c',
            input: 'select',
            inputOptions: {
                'Out of Stock': '📦 Out of Stock',
                'Delivery Issue': '🚚 Delivery Issue',
                'Invalid Details': '❌ Invalid Details',
                'Payment Issue' : 'Payment is fake or no Proof Is Upload',
                'Other': '📝 Other Reason'
            },
            inputPlaceholder: 'Choose Reason',
            showCancelButton: true,
            
            confirmButtonColor: '#e74c3c',
            cancelButtonColor: '#95a5a6',
            confirmButtonText: 'Confirm Reject',
            customClass: {
                input: 'custom-swal-select',
                popup: 'custom-swal-popup'
            },
            inputValidator: (value) => {
                return !value && 'You must select a reason!'
            }
        });
        if(reason) update(ref(db, 'orders/'+id), {status: 'Rejected', rejectReason: reason});
    };

    // --- Users List Logic (Google & Phone Login Users) ---
    onValue(ref(db, 'users'), s => {
        const ul = document.getElementById('userList');
        ul.innerHTML = "";
        s.forEach(c => {
            const u = c.val();
            const contactNum = u.phone || u.mob || c.key;
            let addrDisplay = "";
            if (u.fullAddress) {
                addrDisplay = `
                    <div class="user-addr-box">
                        <i class="fa fa-map-marker-alt" style="color:#ff9900"></i> 
                        <b>${u.fullAddress.street || ''}</b><br>
                        ${u.fullAddress.landmark ? u.fullAddress.landmark + '<br>' : ''}
                        ${u.fullAddress.city || ''} - ${u.fullAddress.pincode || ''}
                    </div>`;
            } else {
                addrDisplay = `<div class="user-addr-box" style="border-left-color: #ccc; color: #888;">${u.address || 'Address Not Updated'}</div>`;
            }

            ul.innerHTML += `<tr>
                <td>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${u.profilePic || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" style="width:35px; height:35px; border-radius:50%; object-fit:cover; border: 1px solid #ddd;">
                        <div>
                            <b>${u.name || 'User'}</b><br>
                            <small style="color:#888; font-size:10px;">${u.email || ''}</small>
                        </div>
                    </div>
                </td>
                <td>
                    ${contactNum && contactNum.length >= 10 ? 
                        `<a href="tel:${contactNum}" style="text-decoration:none; color:#1a73e8; font-weight:600;">
                            <i class="fa fa-phone-alt" style="font-size:10px;"></i> +91 ${contactNum}
                        </a>` : 
                        '<span style="color:#ccc; font-size:12px;">No Number</span>'
                    }
                </td>
                <td>${addrDisplay}</td>
            </tr>`;
        });
    });

    window.deleteItem = (p) => Swal.fire({title:'Delete Permanently?', icon:'warning', showCancelButton:true}).then(r => r.isConfirmed && remove(ref(db, p)));

</script>
</body>
</html>
