<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartPrime - Secure Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff9900;
            --dark-bg: #1a1a2e;
            --light-bg: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, var(--dark-bg), #16213e); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
        }

        .auth-card { 
            background: white; 
            width: 100%; 
            max-width: 420px; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }

        .tabs { 
            display: flex; 
            margin-bottom: 25px; 
            background: #f1f1f1;
            border-radius: 12px;
            padding: 5px;
        }

        .tab { 
            flex: 1; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            font-weight: 700; 
            color: #666; 
            border-radius: 10px;
            transition: 0.3s;
        }

        .tab.active { 
            color: var(--primary); 
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .form-box { display: none; animation: fadeIn 0.4s ease; }
        .form-box.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #444; }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1.5px solid #eee; 
            border-radius: 10px; 
            outline: none; 
            font-size: 15px;
            transition: 0.3s;
        }
        
        input:focus { border-color: var(--primary); background: #fffcf5; }

        .btn { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            border: none; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 10px; 
            font-size: 16px; 
            color: white; 
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.3);
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.98); }
        
        .google-btn {
            width: 100%; padding: 12px; background: white; border: 1.5px solid #eee; 
            border-radius: 10px; cursor: pointer; margin-top: 15px; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 600; color: #555; transition: 0.3s;
        }
        .google-btn:hover { background: #fafafa; border-color: #ddd; }

        .divider { text-align: center; margin: 20px 0; color: #aaa; font-size: 13px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 35%; height: 1px; background: #eee; }
        .divider::before { left: 0; } .divider::after { right: 0; }

        /* Modern SweetAlert Custom Styles */
        .custom-swal-popup {
            border-radius: 24px !important;
            padding: 20px !important;
            background: rgba(255, 255, 255, 0.98) !important;
            border: 1px solid rgba(255, 153, 0, 0.2);
        }

        .custom-swal-title {
            color: #1a1a2e !important;
            font-weight: 800 !important;
        }

        .custom-swal-confirm {
            border-radius: 12px !important;
            padding: 12px 30px !important;
            font-weight: 600 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 400px) {
            .auth-card { padding: 20px; }
            .btn { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <div id="loginBox" class="form-box active">
        <div class="input-group">
            <label>Mobile / Email</label>
            <input type="text" id="lUser" placeholder="Enter Mobile or Email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="lPass" placeholder="••••••••">
        </div>
        <button class="btn" onclick="login()">Sign In</button>
        
        <div class="divider">OR CONTINUE WITH</div>
        
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://img.icons8.com/color/20/000000/google-logo.png"/> Google
        </button>
    </div>

    <div id="registerBox" class="form-box">
        <div class="input-group"><label>Shop/User Name</label><input type="text" id="rName" placeholder="Full Name"></div>
        <div class="input-group"><label>Mobile Number</label><input type="tel" id="rMob" placeholder="10 Digit Number"></div>
        <div class="input-group"><label>House No./Building</label><input type="text" id="rHouse"></div>
        <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1;"><label>Pincode</label><input type="number" id="rPin"></div>
            <div class="input-group" style="flex:1;"><label>State</label><input type="text" id="rState" value="Kerala"></div>
        </div>
        <div class="input-group"><label>Set Password</label><input type="password" id="rPass" placeholder="Min. 6 characters"></div>
        <button class="btn" onclick="register()">Create Account</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAGkPzKBoH5BGsALtEGVyn41hPk1mL__1w",
        authDomain: "yoush0pcart.firebaseapp.com",
        projectId: "yoush0pcart",
        storageBucket: "yoush0pcart.firebasestorage.app",
        messagingSenderId: "519708489514",
        appId: "1:519708489514:web:f0f97e6ea60c2915cb9053"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Enhanced Modern SweetAlert Helper
    const showAlert = (title, text, icon) => {
        return Swal.fire({
            title: title,
            text: text,
            icon: icon,
            iconColor: icon === 'success' ? '#2ecc71' : '#ff9900',
            showConfirmButton: icon !== 'success',
            confirmButtonText: 'Continue',
            confirmButtonColor: '#ff9900',
            timer: icon === 'success' ? 1800 : null,
            timerProgressBar: icon === 'success',
            showClass: { popup: 'animate__animated animate__zoomIn animate__faster' },
            hideClass: { popup: 'animate__animated animate__zoomOut animate__faster' },
            customClass: {
                popup: 'custom-swal-popup',
                title: 'custom-swal-title',
                confirmButton: 'custom-swal-confirm'
            }
        });
    };

    // Google Login
    window.googleLogin = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            await update(ref(db, 'users/' + user.uid), {
                name: user.displayName,
                email: user.email,
                profilePic: user.photoURL,
                lastLogin: new Date().toLocaleString('en-IN'),
                role: 'user'
            });

            localStorage.setItem('userRole', 'user');
            localStorage.setItem('userMob', user.uid);

            showAlert("Welcome!", `Logged in as ${user.displayName}`, "success").then(() => {
                window.location.href = 'index.html';
            });
        } catch (error) {
            showAlert("Login Error", "Google login failed. Please try again.", "error");
        }
    };

    // Traditional Login
    window.login = async () => {
        const userVal = document.getElementById('lUser').value.trim();
        const passVal = document.getElementById('lPass').value.trim();

        if(!userVal || !passVal) return showAlert("Empty Fields", "Please fill all fields", "warning");

        if(userVal.includes('@')) {
            try {
                await signInWithEmailAndPassword(auth, userVal, passVal);
                localStorage.setItem('userRole', 'admin');
                window.location.href = 'index.html';
            } catch (e) { showAlert("Access Denied", "Invalid Admin credentials", "error"); }
            return;
        }

        get(child(ref(db), `users/${userVal}`)).then((snapshot) => {
            if (snapshot.exists() && snapshot.val().pass === passVal) {
                localStorage.setItem('userRole', 'user');
                localStorage.setItem('userMob', userVal); 
                window.location.href = 'index.html';
            } else {
                showAlert("Login Failed", "Incorrect mobile or password", "error");
            }
        });
    };

    // Register Function
  // --- Register Function Update ---
window.register = async () => {
    const name = document.getElementById('rName').value.trim();
    const mob = document.getElementById('rMob').value.trim();
    const house = document.getElementById('rHouse').value.trim();
    const pin = document.getElementById('rPin').value.trim();
    const state = document.getElementById('rState').value.trim();
    const pass = document.getElementById('rPass').value.trim();

    // Validation
    if (!name || mob.length < 10 || !house || !pin || pass.length < 6) {
        return showAlert("Invalid Data", "Ellam correct ayi fill cheyyuka (Password min 6 chars)", "warning");
    }

    try {
        const snapshot = await get(child(ref(db), `users/${mob}`));
        if (snapshot.exists()) {
            return showAlert("Wait!", "Ee number munne register cheythittundu", "warning");
        }

        // Data saving with all fields
        await set(ref(db, 'users/' + mob), { 
            name, 
            mob, 
            pass, 
            address: house,
            pincode: pin,
            state: state,
            lastLogin: "New User",
            role: 'user'
        });

        showAlert("Success", "Account ready ayi!", "success").then(() => window.location.reload());
    } catch (error) {
        showAlert("Error", "Registration failed. Pinne sremikkuka.", "error");
    }
};

// --- Traditional Login Update ---
window.login = async () => {
    const userVal = document.getElementById('lUser').value.trim();
    const passVal = document.getElementById('lPass').value.trim();

    if(!userVal || !passVal) return showAlert("Empty Fields", "Fields fill cheyyuka", "warning");

    // Admin Login (Email vechu login cheyyan)
    if(userVal.includes('@')) {
        try {
            await signInWithEmailAndPassword(auth, userVal, passVal);
            localStorage.setItem('userRole', 'admin');
            window.location.href = 'index.html';
        } catch (e) { 
            showAlert("Access Denied", "Invalid Admin credentials", "error"); 
        }
        return;
    }

    // Normal User Login (Mobile number vechu)
    get(child(ref(db), `users/${userVal}`)).then((snapshot) => {
        if (snapshot.exists()) {
            const userData = snapshot.val();
            if(userData.pass === passVal) {
                localStorage.setItem('userRole', 'user');
                localStorage.setItem('userMob', userVal); 
                localStorage.setItem('userName', userData.name); // Name koodi save cheyyunnu
                window.location.href = 'index.html';
            } else {
                showAlert("Login Failed", "Password thettannu", "error");
            }
        } else {
            showAlert("Login Failed", "Ee number register cheythittilla", "error");
        }
    });
};

    // Tab Switcher
    window.switchTab = (t) => {
        document.getElementById('loginBox').classList.toggle('active', t === 'login');
        document.getElementById('registerBox').classList.toggle('active', t === 'register');
        document.getElementById('tab-login').classList.toggle('active', t === 'login');
        document.getElementById('tab-register').classList.toggle('active', t === 'register');
    };
</script>
</body>
</html>
